<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Swet Finserve — Welcome</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero-top">
          <div class="logo-wrap">
            <img src="assets/logo.svg" class="logo logo-default" alt="Swet Finserve logo" />
            <img src="assets/logo-dark.svg" class="logo logo-dark" alt="Swet Finserve logo dark" />
            <img src="assets/logo-alt.svg" class="logo logo-alt" alt="Swet Finserve alternate logo" />
          </div>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌗</button>
        </div>
        <h1 class="welcome">Welcome to Swet Finserve</h1>
        <p class="category">Finance &amp; Insurance Consultancy Services</p>
      </header>

      <section class="progress-section" aria-live="polite">
        <div class="progress-wrapper">
          <div id="progress-bar" class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <div id="progress-text" class="progress-text">Loading... 0%</div>
        </div>
      </section>

      <section class="contact">
        <h2>Contact</h2>
        <p><strong>Office Address:</strong> Office No. S – 6, 2nd Floor, Radheshyam Chamber, Pirchalla Road, Haluriya Road, Bhavnagar -364001 – Gujarat</p>
        <p><strong>Phone:</strong> <a href="tel:+919429965252">9429965252</a></p>
        <p><strong>Email:</strong> <a href="mailto:swetfinserve@gmail.com">swetfinserve@gmail.com</a></p>
      </section>

      <footer class="site-footer">
        <div class="social">
          <a href="https://facebook.com/swetfinserve" target="_blank" rel="noopener" aria-label="Facebook">Facebook</a>
          <a href="https://twitter.com/swetfinserve" target="_blank" rel="noopener" aria-label="Twitter">Twitter</a>
          <a href="https://linkedin.com/company/swet-finserve" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a>
        </div>
      </footer>
    </main>
    <script src="script.js"></script>
  </body>
</html>
