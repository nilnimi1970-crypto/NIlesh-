<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="Swet Finserve logo dark">
  <defs>
    <linearGradient id="lg2" x1="0" x2="1">
      <stop offset="0" stop-color="#0b2340"/>
      <stop offset="1" stop-color="#123a6b"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="#071226"/>

  <g transform="translate(20,20)">
    <rect width="220" height="220" rx="24" fill="url(#lg2)" filter="url(#shadow2)"/>

    <g transform="translate(110,98)">
      <circle r="56" fill="#ffffff" opacity="0.06"></circle>
      <text x="0" y="12" text-anchor="middle" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#fff">SF</text>
    </g>

    <text x="110" y="190" text-anchor="middle" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#e6eefc">Swet Finserve</text>
  </g>
</svg>
