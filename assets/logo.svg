<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="Swet Finserve logo">
  <defs>
    <linearGradient id="lg" x1="0" x2="1">
      <stop offset="0" stop-color="#2b7cff"/>
      <stop offset="1" stop-color="#6fb1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0b3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="#fff"/>

  <g transform="translate(20,20)">
    <rect width="220" height="220" rx="24" fill="url(#lg)" filter="url(#shadow)"/>

    <g transform="translate(110,98)">
      <circle r="56" fill="#fff" opacity="0.08"></circle>
      <text x="0" y="12" text-anchor="middle" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#fff">SF</text>
    </g>

    <text x="110" y="190" text-anchor="middle" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#07203a">Swet Finserve</text>
  </g>
</svg>
